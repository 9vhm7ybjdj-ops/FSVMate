<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FSVMate - Food Safety Visit</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FSVMate">
  
  <link rel="apple-touch-icon" href="icon-180.png">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8102e">

  <style>
    :root {
      --mc-red: #c8102e;
      --mc-yellow: #ffd700;
      --load-time: 3s; /* Global configuration for 3 seconds */
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      /* Prevent rapid double-tap zoom behavior on older iOS versions */
      touch-action: manipulation;
    }

    body {
      margin: 0;
      padding: 0;
      /* Matches the background color of the image for a seamless transition */
      background-color: #a70000;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    /* Full-screen wrapper and background image handler */
    .splash-container {
      position: relative;
      width: 100%;
      max-width: 480px; /* iPhone MAX standard width for safe layout */
      height: 100vh;
      /* Use the static background provided */
      background-image: url('splash_background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      /* Accommodates iOS status bar notch and home indicator pill when standalone */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Header Logo Area */
    .header-logo {
      width: 100%;
      height: 25vh; /* Upper quarter of the screen */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    /* Character and Tray Area */
    .character-logo {
      flex: 1; /* Occupies middle space */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
    }

    /* -- The Working Loading Bar and Text System -- */
    .loading-zone {
      width: 100%;
      height: 20vh; /* Lower part of the screen */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    /* Outer container (the darker area behind the static bar in your image) */
    .progress-bar-container {
      width: 80%; /* Aligns with the static bar */
      height: 24px;
      background-color: rgba(60, 0, 0, 0.7); /* Dark semi-transparent overlay */
      border-radius: 99px;
      overflow: hidden; /* Important: clips the moving bar */
      position: relative;
      box-shadow: 
        0 4px 10px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(0, 0, 0, 0.5); /* Outer bezel */
    }

    /* The actual working yellow bar */
    .progress-bar-inner {
      height: 100%;
      width: 0%; /* Initial state for animation */
      background: linear-gradient(to right, #ffd700, #fff); /* Matches your gold-to-white text gradient */
      border-radius: 99px;
      /* CSS animation synchronized with the JavaScript timer */
      animation: fillBar var(--load-time) linear forwards;
      box-shadow: 
        inset 0 2px 2px rgba(255, 255, 255, 0.5), /* Inner highlight */
        0 0 8px #ffd700; /* Subtle outer glow */
    }

    /* Animation definition for linear growth from 0 to 100% */
    @keyframes fillBar {
      0% { width: 0%; }
      /* We use 98.5% instead of 100% to keep a small bezel visible at the far right edge, similar to your image design */
      100% { width: 98.5%; }
    }

    /* Loading Text and Powered By text */
    .loading-text {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .powered-text {
      position: absolute;
      bottom: calc(10px + env(safe-area-inset-bottom));
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="photoPreviewOverlay" class="photo-preview-overlay" style="display:none;">
    <img id="photoPreviewImg" class="photo-preview-image" src="" alt="Report Preview">
    <div class="photo-instruction">Press and hold the image above,<br>then select <strong>"Save to Photos"</strong>.</div>
    <button class="dialog-btn cancel" id="closePhotoPreview" style="max-width:200px;">Close Preview</button>
  </div>

  <script>
    /* --- 1. Synthesized Audio Engine (Tak-Tile Mechanical Click) --- */
    let audioCtx = null;
    let auditMetadata = { store: "", auditor: "", timestamp: "", scoreStr: "" };

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
      initAudio();
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime;

      if (type === 'swipe') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.18);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
        osc.start(now);
        osc.stop(now + 0.18);
      } else if (type === 'action' || type === 'click') {
        // Uniform click action logic applied back to manual tab presses
        osc.type = 'square';
        osc.frequency.setValueAtTime(1400, now);
        osc.frequency.exponentialRampToValueAtTime(120, now + 0.015);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.018);
        osc.start(now);
        osc.stop(now + 0.018);
      }
    }

    /* --- 2. Tab and Touch Control System --- */
    const tabs = document.querySelectorAll(".tab");
    const sections = document.querySelectorAll(".section");
    const scoreText = document.getElementById("scoreText");
    const passText = document.getElementById("passText");
    const contentEl = document.getElementById("content");
    const tabOrder = ["critical", "back", "kitchen", "service", "storewide"];

    function setActiveTab(targetId, source) {
      const activeTab = document.querySelector(".tab.active");
      if (activeTab && activeTab.dataset.target === targetId) return;

      tabs.forEach(t => t.classList.toggle("active", t.dataset.target === targetId));
      sections.forEach(s => s.classList.toggle("active", s.id === targetId));
      
      const newActiveTab = document.querySelector(".tab.active");
      if (newActiveTab) newActiveTab.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });

      if (source === 'swipe') playSound('swipe');
      else if (source === 'click') playSound('click'); // Click audio trigger activated
    }

    tabs.forEach(tab => tab.addEventListener("click", () => setActiveTab(tab.dataset.target, 'click')));

    let startX = null;
    contentEl.addEventListener("touchstart", e => { startX = e.touches[0].clientX; });
    contentEl.addEventListener("touchend", e => {
      if (startX === null) return;
      const delta = e.changedTouches[0].clientX - startX;
      if (Math.abs(delta) > 60) {
        const idx = tabOrder.indexOf(document.querySelector(".section.active").id);
        let nIdx = idx;
        if (delta < 0 && idx < tabOrder.length - 1) nIdx = idx + 1;
        if (delta > 0 && idx > 0) nIdx = idx - 1;
        if (nIdx !== idx) setActiveTab(tabOrder[nIdx], 'swipe');
      }
      startX = null;
    });

    function setCheckVisual(box, symbol, color) {
      if (!symbol) { box.innerHTML = "<span></span>"; box.classList.remove("active"); return; }
      box.classList.add("active");
      box.innerHTML = `<span style="color:${color || ''}; font-weight:900;">${symbol}</span>`;
    }

    /* --- 3. Deficiency & Log Dialogue Logic (Terminology Updated) --- */
    const reasonDialogEl = document.getElementById("reasonDialog");
    const reasonInput = document.getElementById("reasonInput");
    let reasonCallback = null;

    function showReasonDialog(callback) {
      reasonCallback = callback;
      reasonDialogEl.style.display = "flex";
      reasonInput.value = "";
      reasonInput.focus();
    }

    document.getElementById("reasonSubmit").addEventListener("click", () => {
      reasonDialogEl.style.display = "none";
      if (reasonCallback) { reasonCallback(reasonInput.value.trim() || "No details logged"); reasonCallback = null; }
    });
    document.getElementById("reasonCancel").addEventListener("click", () => {
      reasonDialogEl.style.display = "none";
      if (reasonCallback) { reasonCallback("No details logged"); reasonCallback = null; }
    });

    /* --- 4. Question & Question List Controllers --- */
    function getSecondarySubBoxes(group) { return Array.from(document.querySelectorAll(`.secondary-sub-box[data-secondary-group="${group}"]`)); }
    function getSecondarySubRow(group) { return document.querySelector(`.secondary-sub-row[data-secondary-group="${group}"]`); }

    function createSecondarySubBox(group) {
      const row = getSecondarySubRow(group);
      const box = document.createElement("div");
      box.className = "check-box secondary-sub-box";
      box.dataset.secondaryGroup = group;
      box.dataset.state = "blank";
      box.addEventListener("click", () => {
        playSound('action');
        if (box.dataset.state === "blank") {
          showReasonDialog(r => {
            box.dataset.state = "fail"; box.dataset.reason = r; setCheckVisual(box, "✕", "#c8102e");
            if (!getSecondarySubBoxes(group).some(s => s.dataset.state === "blank") && getSecondarySubBoxes(group).length < 10) createSecondarySubBox(group);
            recalcScore();
          });
        } else {
          box.remove();
          recalcScore();
        }
      });
      row.appendChild(box);
      return box;
    }

    function recalcScore() {
      let total = 0, max = 0, criticalFail = false;

      document.querySelectorAll(".btn-group[data-critical]").forEach(g => {
        if (g.querySelector(".btn-no").classList.contains("active")) criticalFail = true;
      });

      document.querySelectorAll(".check-box:not(.secondary-sub-box)").forEach(b => { max += parseInt(b.dataset.score || "0", 10); });

      document.querySelectorAll(".secondary-main").forEach(main => {
        const group = main.dataset.secondaryGroup;
        const fails = getSecondarySubBoxes(group).filter(s => s.dataset.state === "fail").length;
        if (fails >= 3) { main.dataset.state = "fail"; setCheckVisual(main, "✕", "#c8102e"); }
        else if (main.dataset.state !== "blank" && main.dataset.state !== "pass") { main.dataset.state = "pass"; setCheckVisual(main, "✓"); }
        getSecondarySubRow(group).style.display = fails > 0 ? "flex" : "none";
      });

      document.querySelectorAll(".check-box:not(.secondary-sub-box)").forEach(b => {
        if (b.dataset.state === "pass") total += parseInt(b.dataset.score || "0", 10);
      });

      if (criticalFail) total = 0;
      const pct = (total / (max || 1)) * 100;
      // Terminology changed from Deficiency to Opportunity
      auditMetadata.scoreStr = `${total} / ${max} — ${pct.toFixed(1)}% ${criticalFail ? '[CRITICAL FAILED]' : ''}`;
      scoreText.textContent = `${total} / ${max} — ${pct.toFixed(1)}%`;

      if (criticalFail) { passText.textContent = "CRITICAL FAIL"; passText.style.color = "#ffb3c0"; }
      else if (pct >= 90) { passText.textContent = "PASS"; passText.style.color = "#000"; }
      else { passText.textContent = "PENDING"; passText.style.color = "#000"; }

      const allAns = Array.from(document.querySelectorAll(".btn-group[data-critical]")).every(g => g.querySelector(".btn-yes").classList.contains("active") || g.querySelector(".btn-no").classList.contains("active")) &&
                     Array.from(document.querySelectorAll(".check-box:not(.secondary-sub-box)")).every(b => b.dataset.state && b.dataset.state !== "blank");
      document.getElementById("finishBtn").classList.toggle("show", allAns);
    }

    document.querySelectorAll('.check-box:not(.secondary-sub-box)').forEach(box => {
      const wrapper = document.createElement('div');
      wrapper.className = 'check-with-score';
      box.parentNode.insertBefore(wrapper, box); wrapper.appendChild(box);
      const b = document.createElement('span'); b.className = 'score-badge'; b.textContent = `(+${box.dataset.score})`; wrapper.appendChild(b);
    });

    document.querySelectorAll(".btn-group[data-critical]").forEach(g => {
      const y = g.querySelector(".btn-yes"), n = g.querySelector(".btn-no");
      y.addEventListener("click", () => { playSound('action'); g.dataset.state="pass"; y.classList.add("active"); n.classList.remove("active"); delete g.dataset.reason; recalcScore(); });
      n.addEventListener("click", () => { playSound('action'); g.dataset.state="fail"; n.classList.add("active"); y.classList.remove("active"); showReasonDialog(r => { g.dataset.reason = r; recalcScore(); }); });
    });

    document.querySelectorAll(".check-box").forEach(box => {
      box.dataset.state = "blank";
      if (box.classList.contains("secondary-main")) {
        box.addEventListener("click", () => {
          playSound('action');
          if (box.dataset.state === "blank") { box.dataset.state = "pass"; setCheckVisual(box, "✓"); }
          else if (box.dataset.state === "pass") { box.dataset.state = "pending"; showReasonDialog(r => { createSecondarySubBox(box.dataset.secondaryGroup).dataset.reason = r; recordSubFail(box.dataset.secondaryGroup, r); }); }
          else { box.dataset.state = "blank"; delete box.dataset.reason; getSecondarySubBoxes(box.dataset.secondaryGroup).forEach(s => s.remove()); setCheckVisual(box, null); }
          recalcScore();
        });
      } else if (!box.classList.contains("secondary-sub-box")) {
        box.addEventListener("click", () => {
          playSound('action');
          if (box.dataset.state === "blank") { box.dataset.state = "pass"; setCheckVisual(box, "✓"); }
          else if (box.dataset.state === "pass") { showReasonDialog(r => { box.dataset.state = "fail"; box.dataset.reason = r; setCheckVisual(box, "✕", "#c8102e"); recalcScore(); }); }
          else { box.dataset.state = "blank"; setCheckVisual(box, null); delete box.dataset.reason; }
          recalcScore();
        });
      }
    });

    function recordSubFail(g, r) {
      let b = getSecondarySubBoxes(g).find(s => s.dataset.state === "blank");
      if (!b) b = createSecondarySubBox(g);
      b.dataset.state = "fail"; b.dataset.reason = r; setCheckVisual(b, "✕", "#c8102e");
      if (getSecondarySubBoxes(g).length < 10) createSecondarySubBox(g);
      recalcScore();
    }

    /* --- 5. Audit Finalization & Output (terminology & logic updated) --- */
    function buildFailList() {
      const list = [];
      document.querySelectorAll("[data-critical]").forEach(g => {
        // Critical Minimums question structure is handled differently
        if (g.dataset.state === "fail") list.push({ q: g.closest(".item-row").querySelector(".item-label").textContent, r: g.dataset.reason || "N/A" });
      });
      document.querySelectorAll(".check-box").forEach(b => {
        if (b.dataset.state === "fail" && b.dataset.reason) {
          let label = b.closest(".item-row").querySelector(".item-label").textContent;
          if (b.classList.contains("secondary-sub-box")) label += " (Sub-Timer Issue)";
          list.push({ q: label, r: b.dataset.reason });
        }
      });
      return list;
    }

    const finishBtn = document.getElementById("finishBtn");
    const metaDialog = document.getElementById("metaDialog");
    const completeDialog = document.getElementById("completeDialog");
    const logViewer = document.getElementById("logViewer");
    const photoPreviewOverlay = document.getElementById("photoPreviewOverlay");
    const photoPreviewImg = document.getElementById("photoPreviewImg");

    // Phase 1: Lock File Metadata Entry
    finishBtn.addEventListener("click", () => {
      metaDialog.style.display = "flex";
      document.getElementById("metaStore").value = "";
      document.getElementById("metaAuditor").value = "";
    });

    document.getElementById("metaCancel").addEventListener("click", () => metaDialog.style.display = "none");
    
    // Phase 2: Lock & Display Finalization Dialog
    document.getElementById("metaSubmit").addEventListener("click", () => {
      auditMetadata.store = document.getElementById("metaStore").value.trim() || "Default Store";
      auditMetadata.auditor = document.getElementById("metaAuditor").value.trim() || "Anonymous Auditor";
      auditMetadata.timestamp = new Date().toLocaleString();
      
      metaDialog.style.display = "none";
      completeDialog.style.display = "flex";
      // Ensure viewer is reset before displaying finalized dialogue
      logViewer.style.display = "none";
      document.getElementById("viewLogBtn").textContent = "View Opportunity Log";
    });

    // Control Panel: View Interactive Opportunity Log
    document.getElementById("viewLogBtn").addEventListener("click", () => {
      if (logViewer.style.display === "block") {
        logViewer.style.display = "none";
        document.getElementById("viewLogBtn").textContent = "View Opportunity Log";
      } else {
        logViewer.innerHTML = `
          <div class="log-header-block">
            <strong>Store:</strong> ${auditMetadata.store}<br>
            <strong>Auditor:</strong> ${auditMetadata.auditor}<br>
            <strong>Date/Time:</strong> ${auditMetadata.timestamp}<br>
            <strong>Overall Score:</strong> <span style="color:#ffd700;">${auditMetadata.scoreStr}</span>
          </div>
        `;
        const fails = buildFailList();
        if (fails.length === 0) {
          logViewer.innerHTML += `<div style="font-size:12px;color:#85ff85;">✓ 100% Core Standards Compliance. No operational opportunity required.</div>`;
        } else {
          fails.forEach(f => {
            logViewer.innerHTML += `
              <div class="log-item">
                <span style="color:#ffb3c0; font-weight:600;">Opportunity:</span> ${f.q}<br>
                <span style="color:var(--mc-yellow-soft);">Action Detail:</span> ${f.r}
              </div>`;
          });
        }
        logViewer.style.display = "block";
        document.getElementById("viewLogBtn").textContent = "Hide Opportunity Log";
      }
    });

    // Control Panel Actions
    document.getElementById("closeDialog").addEventListener("click", () => completeDialog.style.display = "none");
    document.getElementById("newAudit").addEventListener("click", () => location.reload());
    document.getElementById("closePhotoPreview").addEventListener("click", () => photoPreviewOverlay.style.display = "none");

    // Phase 3: Export PNG Report (terminology and mobile save updated)
    document.getElementById("exportPNG").addEventListener("click", () => {
      const box = document.createElement("div");
      Object.assign(box.style, { width: "620px", padding: "26px", background: "#0b0205", color: "#fff", fontFamily: "system-ui, sans-serif", borderRadius: "16px" });
      
      // Update terminology from Performance Metric to Overall Score in PNG header
      box.innerHTML = `
        <div style="font-size:22px; font-weight:800; color:#ffd700; margin-bottom:4px; text-transform:uppercase;">Food Safety Visit Log</div>
        <div style="font-size:13px; color:#c7c7c7; margin-bottom:16px; border-bottom:2px solid #c8102e; padding-bottom:10px; line-height:1.6;">
          <strong>Store Profile:</strong> ${auditMetadata.store}<br>
          <strong>Inspected By:</strong> ${auditMetadata.auditor}<br>
          <strong>Timestamp:</strong> ${auditMetadata.timestamp}<br>
          <strong>Overall Score:</strong> <span style="color:#ffd700; font-weight:700;">${auditMetadata.scoreStr}</span>
        </div>
      `;

      const fails = buildFailList();
      if (fails.length === 0) {
        box.innerHTML += `<div style="color:#85ff85; font-size:14px; font-weight:600;">✓ All standards logged successfully compliant. No operational opportunity required.</div>`;
      } else {
        fails.forEach(f => {
          // Update terminology from deficiency detail to opportunity detail
          box.innerHTML += `
            <div style="margin-bottom:12px; padding:12px; background:rgba(255,255,255,0.03); border-left:4px solid #c8102e; border-radius:4px;">
              <div style="font-size:13px; font-weight:700; color:#fff6a0; margin-bottom:4px;">${f.q}</div>
              <div style="font-size:12px; color:#e0e0e0;"><span style="color:#ffb3c0; font-weight:600;">Opportunity Detail:</span> ${f.r}</div>
            </div>`;
        });
      }

      document.body.appendChild(box);
      html2canvas(box, { scale: 2, backgroundColor: "#0b0205" }).then(canvas => {
        // MOBILE OPTIMIZATION: Instead of programmatic download, display image on screen inside a PWA overlay.
        photoPreviewImg.src = canvas.toDataURL("image/png");
        photoPreviewOverlay.style.display = "flex";
        
        // Clean up the off-screen div used to generate the canvas
        box.remove();
      });
    });

    recalcScore();
  </script>
</body>
</html>
