<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McCafé POS – Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #3b2f2f;
        color: #fff;
        overflow: hidden;
    }

    .app-container {
        display: flex;
        height: 100vh;
    }

    /* POS PANEL */
    .pos-panel {
        position: relative;
        flex: 1;
        padding: 16px;
        border-right: 2px solid #2b2222;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        overflow: hidden;
    }

    .pos-header {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
    }

    .dashboard-button {
        padding: 8px 12px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        background: #c08552;
        color: #3b2f2f;
        cursor: pointer;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 10px;
    }

    .product-btn {
        background: #d4a373;
        color: #3b2f2f;
        border: none;
        border-radius: 10px;
        padding: 16px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        text-align: center;
    }

    .product-btn:active {
        transform: scale(0.96);
    }

    .order-display {
        flex: 1;
        background: #4a3a3a;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 10px;
        overflow-y: auto;
    }

    .order-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        background: #5a4646;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    .order-line.selected {
        background: #e0b58a;
        color: #3b2f2f;
    }

    .order-totals {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 18px;
    }

    .bottom-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
    }

    .action-btn {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    .clear-btn { background: #8d4b4b; color: #fff; }
    .void-btn  { background: #b36b6b; color: #fff; }
    .store-btn { background: #4caf50; color: #fff; }

    .action-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    #drawerBar {
        width: 100%;
        height: 40px;
        background: #222;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
    }

    /* KVS PANEL */
    .kvs-panel {
        flex: 1;
        padding: 16px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .kvs-header {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .kvs-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
    }

    .kvs-tab {
        padding: 6px 12px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: #5a4646;
        color: #fff;
        font-weight: bold;
    }

    .kvs-tab.active {
        background: #d4a373;
        color: #3b2f2f;
    }

    .kvs-list {
        flex: 1;
        background: #4a3a3a;
        border-radius: 10px;
        padding: 10px;
        overflow-y: auto;
    }

    .kvs-order {
        background: #5a4646;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 16px;
    }

    .kvs-order-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        font-weight: bold;
    }

    .kvs-items {
        margin-bottom: 6px;
    }

    .kvs-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .serve-btn {
        padding: 6px 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }

    .serve-ready { background: #4caf50; color: #fff; }
    .status-pill {
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 13px;
        background: #2e7d32;
    }

    /* PAYMENT PANEL (SLIDE-IN) */
    .payment-panel {
        position: absolute;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100%;
        background: #2f2525;
        box-sizing: border-box;
        padding: 16px;
        display: flex;
        flex-direction: column;
        transition: transform 0.35s ease-out;
        transform: translateX(0);
    }

    .payment-panel.show {
        transform: translateX(-100%);
    }

    .payment-header {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .payment-summary {
        margin-bottom: 10px;
        font-size: 18px;
    }

    .payment-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 18px;
    }

    .tender-display {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .quick-cash {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
    }

    .quick-btn {
        flex: 1 1 30%;
        padding: 10px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #d4a373;
        color: #3b2f2f;
        font-weight: bold;
    }

    .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 10px;
    }

    .key-btn {
        padding: 14px;
        font-size: 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #5a4646;
        color: #fff;
        font-weight: bold;
    }

    .pay-actions {
        display: flex;
        gap: 8px;
        margin-top: auto;
    }

    .pay-complete {
        flex: 1;
        padding: 12px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    .pay-cash { background: #4caf50; color: #fff; }
    .pay-card { background: #c08552; color: #3b2f2f; }

    .pay-complete:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }

    .cancel-payment {
        margin-top: 8px;
        padding: 8px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #8d4b4b;
        color: #fff;
    }

    /* DRAWER OVERLAY */
    #drawerOverlay {
        position: absolute;
        bottom: -200px;
        left: 0;
        width: 100%;
        background: #111;
        color: #fff;
        padding: 16px;
        box-sizing: border-box;
        border-radius: 12px 12px 0 0;
        transition: transform 0.35s ease-out;
        transform: translateY(0);
    }

    #drawerOverlay.open {
        transform: translateY(-200px);
    }

    .drawer-title {
        font-size: 20px;
        margin-bottom: 8px;
    }

    .drawer-change {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .drawer-close-btn {
        padding: 10px 16px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #d4a373;
        color: #3b2f2f;
        font-weight: bold;
    }

    /* DASHBOARD MODAL */
    #dashboardModal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .dashboard-box {
        background: #4a3a3a;
        padding: 24px;
        border-radius: 10px;
        width: 360px;
        text-align: center;
    }

    .dash-title {
        font-size: 24px;
        margin-bottom: 16px;
    }

    .dash-stat {
        font-size: 20px;
        margin: 6px 0;
    }

    .close-btn {
        margin-top: 16px;
        padding: 8px 16px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        background: #d4a373;
        color: #3b2f2f;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="app-container">

    <!-- POS -->
    <div class="pos-panel">
        <div class="top-row">
            <div class="pos-header">McCafé POS</div>
            <button class="dashboard-button" onclick="openDashboard()">Dashboard</button>
        </div>

        <div class="product-grid">
            <button class="product-btn" data-name="Latte" data-price="4.50" onclick="addItem(this)">Latte<br>$4.50</button>
            <button class="product-btn" data-name="Flat White" data-price="4.50" onclick="addItem(this)">Flat White<br>$4.50</button>
            <button class="product-btn" data-name="Cappuccino" data-price="4.50" onclick="addItem(this)">Cappuccino<br>$4.50</button>
            <button class="product-btn" data-name="Mocha" data-price="5.00" onclick="addItem(this)">Mocha<br>$5.00</button>
            <button class="product-btn" data-name="Long Black" data-price="4.00" onclick="addItem(this)">Long Black<br>$4.00</button>
            <button class="product-btn" data-name="Hot Chocolate" data-price="4.50" onclick="addItem(this)">Hot Chocolate<br>$4.50</button>
        </div>

        <div class="order-display" id="orderDisplay"></div>

        <div class="order-totals">
            <span>Items: <span id="itemCount">0</span></span>
            <span>Total: $<span id="orderTotal">0.00</span></span>
        </div>

        <div class="bottom-actions">
            <button class="action-btn clear-btn" id="clearBtn" onclick="clearOrder()">CLEAR</button>
            <button class="action-btn void-btn" id="voidBtn" onclick="voidSelected()">VOID</button>
            <button class="action-btn store-btn" id="storeBtn" onclick="storeOrder()">STORE ORDER</button>
        </div>

        <div id="drawerBar"></div>

        <!-- PAYMENT PANEL (SLIDE-IN) -->
        <div class="payment-panel" id="paymentPanel">
            <div class="payment-header">Payment</div>
            <div class="payment-summary">
                Order #<span id="payOrderId">0</span> — Total: $<span id="payTotal">0.00</span>
            </div>
            <div class="payment-row">
                <span>Tendered:</span>
                <span>$<span id="tenderedDisplay">0.00</span></span>
            </div>
            <div class="payment-row">
                <span>Change:</span>
                <span>$<span id="changeDisplay">0.00</span></span>
            </div>

            <div class="tender-display">Enter cash or choose card</div>

            <div class="quick-cash">
                <button class="quick-btn" onclick="addQuickCash(5)">$5</button>
                <button class="quick-btn" onclick="addQuickCash(10)">$10</button>
                <button class="quick-btn" onclick="addQuickCash(20)">$20</button>
                <button class="quick-btn" onclick="addQuickCash(50)">$50</button>
                <button class="quick-btn" onclick="addQuickCash(100)">$100</button>
            </div>

            <div class="keypad">
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('.')">.</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn" onclick="pressKey('back')">←</button>
            </div>

            <div class="pay-actions">
                <button class="pay-complete pay-cash" id="completeCashBtn" onclick="completeCash()" disabled>COMPLETE CASH SALE</button>
                <button class="pay-complete pay-card" onclick="completeCard()">CARD PAYMENT</button>
            </div>

            <button class="cancel-payment" onclick="cancelPayment()">Cancel Payment</button>

            <!-- Drawer overlay inside POS panel -->
            <div id="drawerOverlay">
                <div class="drawer-title">Cash Drawer Open</div>
                <div>Give change:</div>
                <div class="drawer-change">$<span id="drawerChangeAmount">0.00</span></div>
                <button class="drawer-close-btn" onclick="closeDrawer()">Close Drawer</button>
            </div>
        </div>
    </div>

    <!-- KVS -->
    <div class="kvs-panel">
        <div class="kvs-header">KVS</div>
        <div class="kvs-tabs">
            <button class="kvs-tab active" id="kvsSide1Tab" onclick="setKvsView(1)">Side 1</button>
            <button class="kvs-tab" id="kvsSide2Tab" onclick="setKvsView(2)">Side 2</button>
        </div>
        <div class="kvs-list" id="kvsList"></div>
    </div>

</div>

<!-- DASHBOARD MODAL -->
<div id="dashboardModal">
    <div class="dashboard-box">
        <div class="dash-title">Dashboard Summary</div>
        <div class="dash-stat">Orders: <span id="dashOrders">0</span></div>
        <div class="dash-stat">Revenue: $<span id="dashRevenue">0.00</span></div>
        <div class="dash-stat">Cash: <span id="dashCash">0</span></div>
        <div class="dash-stat">Card: <span id="dashCard">0</span></div>
        <button class="close-btn" onclick="closeDashboard()">Close</button>
    </div>
</div>

<audio id="beepAudio">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby0g4LVr4EnH7xa0Wk7_7inmmohdTze3ywl3HMyeGrLgC3P5alUPDzjG54bXgXmwo7OLA/exec";

let currentOrder = [];
let selectedIndex = -1;
let kvsOrders = [];
let kvsSideView = 1;
let nextOrderId = 1;

let inPayment = false;
let pendingOrder = null;
let tendered = 0;

/* POS LOGIC */

function addItem(btn) {
    if (inPayment) return;

    const name = btn.getAttribute("data-name");
    const price = parseFloat(btn.getAttribute("data-price"));

    const existing = currentOrder.find(i => i.name === name);
    if (existing) {
        existing.qty += 1;
    } else {
        currentOrder.push({ name, price, qty: 1 });
    }
    selectedIndex = -1;
    renderOrder();
}

function renderOrder() {
    const container = document.getElementById("orderDisplay");
    container.innerHTML = "";

    let total = 0;
    let count = 0;

    currentOrder.forEach((item, idx) => {
        total += item.price * item.qty;
        count += item.qty;

        const line = document.createElement("div");
        line.className = "order-line" + (idx === selectedIndex ? " selected" : "");
        line.innerHTML = `
            <span>${item.name} x${item.qty}</span>
            <span>$${(item.price * item.qty).toFixed(2)}</span>
        `;
        line.onclick = () => {
            if (inPayment) return;
            selectedIndex = idx === selectedIndex ? -1 : idx;
            renderOrder();
        };
        container.appendChild(line);
    });

    document.getElementById("orderTotal").textContent = total.toFixed(2);
    document.getElementById("itemCount").textContent = count;

    document.getElementById("clearBtn").disabled = currentOrder.length === 0 || inPayment;
    document.getElementById("voidBtn").disabled = selectedIndex === -1 || inPayment;
    document.getElementById("storeBtn").disabled = currentOrder.length === 0 || inPayment;
}

function clearOrder() {
    if (inPayment) return;
    currentOrder = [];
    selectedIndex = -1;
    renderOrder();
}

function voidSelected() {
    if (inPayment) return;
    if (selectedIndex < 0 || selectedIndex >= currentOrder.length) return;
    currentOrder.splice(selectedIndex, 1);
    selectedIndex = -1;
    renderOrder();
}

function storeOrder() {
    if (inPayment) return;
    if (currentOrder.length === 0) return;

    const total = parseFloat(document.getElementById("orderTotal").textContent) || 0;
    if (total <= 0) return;

    // Decide side based on load
    const side1Count = kvsOrders.filter(o => o.side === 1).length;
    const side2Count = kvsOrders.filter(o => o.side === 2).length;
    const side = side1Count <= side2Count ? 1 : 2;

    const orderId = nextOrderId++;
    const order = {
        id: orderId,
        side: side,
        items: currentOrder.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
        total: total,
        paymentType: null // decided later
    };

    pendingOrder = order;
    addToKvs(order);
    playBeep();

    // Lock POS and open payment
    inPayment = true;
    document.getElementById("payOrderId").textContent = order.id;
    document.getElementById("payTotal").textContent = order.total.toFixed(2);
    tendered = 0;
    updateTenderDisplay();
    document.getElementById("paymentPanel").classList.add("show");
    document.getElementById("completeCashBtn").disabled = true;
    renderOrder();
}

/* PAYMENT LOGIC */

function addQuickCash(amount) {
    tendered += amount;
    updateTenderDisplay();
}

function pressKey(key) {
    let str = tendered.toString();

    if (key === 'back') {
        str = str.slice(0, -1);
        if (str === "" || str === "-") str = "0";
    } else if (key === '.') {
        if (!str.includes('.')) {
            str += '.';
        }
    } else {
        if (str === "0") str = key;
        else str += key;
    }

    const val = parseFloat(str);
    tendered = isNaN(val) ? 0 : val;
    updateTenderDisplay();
}

function updateTenderDisplay() {
    const total = pendingOrder ? pendingOrder.total : 0;
    const change = tendered - total;

    document.getElementById("tenderedDisplay").textContent = tendered.toFixed(2);
    document.getElementById("changeDisplay").textContent = (change > 0 ? change : 0).toFixed(2);

    const btn = document.getElementById("completeCashBtn");
    if (pendingOrder && tendered >= total && total > 0) {
        btn.disabled = false;
    } else {
        btn.disabled = true;
    }
}

function completeCash() {
    if (!pendingOrder) return;
    const total = pendingOrder.total;
    if (tendered < total) return;

    pendingOrder.paymentType = "cash";
    sendOrderToBackend(pendingOrder);

    const change = tendered - total;
    document.getElementById("drawerChangeAmount").textContent = change.toFixed(2);
    openDrawer();
}

function completeCard() {
    if (!pendingOrder) return;
    pendingOrder.paymentType = "card";
    sendOrderToBackend(pendingOrder);
    resetAfterPayment();
}

function cancelPayment() {
    // Cancel payment but keep order on KVS (like parked)
    pendingOrder = null;
    inPayment = false;
    tendered = 0;
    document.getElementById("paymentPanel").classList.remove("show");
    updateTenderDisplay();
    renderOrder();
}

/* DRAWER */

function openDrawer() {
    const overlay = document.getElementById("drawerOverlay");
    overlay.classList.add("open");
}

function closeDrawer() {
    const overlay = document.getElementById("drawerOverlay");
    overlay.classList.remove("open");
    resetAfterPayment();
}

function resetAfterPayment() {
    pendingOrder = null;
    inPayment = false;
    tendered = 0;
    document.getElementById("paymentPanel").classList.remove("show");
    currentOrder = [];
    selectedIndex = -1;
    renderOrder();
}

/* BACKEND */

function sendOrderToBackend(order) {
    fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "addOrder", order })
    }).catch(() => {});
}

/* KVS */

function addToKvs(order) {
    kvsOrders.push(order);
    renderKvs();
}

function setKvsView(side) {
    kvsSideView = side;
    document.getElementById("kvsSide1Tab").classList.toggle("active", side === 1);
    document.getElementById("kvsSide2Tab").classList.toggle("active", side === 2);
    renderKvs();
}

function renderKvs() {
    const list = document.getElementById("kvsList");
    list.innerHTML = "";

    kvsOrders
        .filter(o => o.side === kvsSideView)
        .forEach(order => {
            const div = document.createElement("div");
            div.className = "kvs-order";

            const itemsHtml = order.items.map(i => `${i.name} x${i.qty}`).join("<br>");

            div.innerHTML = `
                <div class="kvs-order-header">
                    <span>Order #${order.id}</span>
                    <span>$${order.total.toFixed(2)}</span>
                </div>
                <div class="kvs-items">${itemsHtml}</div>
                <div class="kvs-footer">
                    <span class="status-pill">IN QUEUE</span>
                    <button class="serve-btn serve-ready" onclick="serveOrder(${order.id})">SERVE</button>
                </div>
            `;

            list.appendChild(div);
        });
}

function serveOrder(id) {
    kvsOrders = kvsOrders.filter(o => o.id !== id);
    renderKvs();

    fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "serveOrder", orderId: id })
    }).catch(() => {});
}

/* DASHBOARD */

function openDashboard() {
    document.getElementById("dashboardModal").style.display = "flex";
    refreshDashboard();
}

function closeDashboard() {
    document.getElementById("dashboardModal").style.display = "none";
}

function refreshDashboard() {
    fetch(BACKEND_URL + "?summary=1")
        .then(r => r.json())
        .then(data => {
            document.getElementById("dashOrders").textContent = data.totalOrders ?? 0;
            document.getElementById("dashRevenue").textContent = (data.totalRevenue ?? 0).toFixed(2);
            document.getElementById("dashCash").textContent = data.cashCount ?? 0;
            document.getElementById("dashCard").textContent = data.cardCount ?? 0;
        })
        .catch(() => {});
}

/* AUDIO */

function playBeep() {
    const audio = document.getElementById("beepAudio");
    audio.currentTime = 0;
    audio.play().catch(() => {});
}

/* INIT */

renderOrder();
renderKvs();
</script>

</body>
</html>
