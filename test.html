<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McCafé POS System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #3b2f2f;
        color: #fff;
        overflow: hidden;
    }

    .app-container {
        display: flex;
        height: 100vh;
    }

    /* POS PANEL */
    .pos-panel {
        flex: 1;
        padding: 20px;
        border-right: 2px solid #2b2222;
        display: flex;
        flex-direction: column;
    }

    .pos-header {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .order-display {
        flex: 1;
        background: #4a3a3a;
        border-radius: 12px;
        padding: 16px;
        overflow-y: auto;
        margin-bottom: 16px;
    }

    .order-item {
        background: #5a4646;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 18px;
        display: flex;
        justify-content: space-between;
    }

    .order-totals {
        font-size: 20px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 16px;
    }

    .payment-buttons {
        display: flex;
        gap: 16px;
        margin-bottom: 10px;
    }

    .pay-btn {
        flex: 1;
        padding: 20px;
        font-size: 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    .cash { background: #d4a373; color: #3b2f2f; }
    .card { background: #c08552; color: #3b2f2f; }

    .pay-btn:active { transform: scale(0.95); }

    #drawer {
        width: 100%;
        height: 40px;
        background: #222;
        border-radius: 8px;
        overflow: hidden;
    }

    #drawer.open {
        animation: drawerOpen 0.4s forwards;
    }

    @keyframes drawerOpen {
        from { height: 40px; }
        to { height: 140px; }
    }

    /* KVS PANEL */
    .kvs-panel {
        flex: 1;
        padding: 20px;
        display: flex;
        flex-direction: column;
    }

    .kvs-header {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .kvs-list {
        flex: 1;
        background: #4a3a3a;
        border-radius: 12px;
        padding: 16px;
        overflow-y: auto;
    }

    .kvs-order {
        background: #5a4646;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .kvs-order-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-weight: bold;
    }

    .kvs-items { margin-bottom: 8px; }

    .kvs-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .serve-btn {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
    }

    .serve-disabled { background: #777; color: #ccc; cursor: not-allowed; }
    .serve-ready { background: #4caf50; color: #fff; }

    .status-pill {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 14px;
    }

    .status-unpaid { background: #b23b3b; }
    .status-paid { background: #2e7d32; }

    /* DASHBOARD MODAL */
    #dashboardModal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .dashboard-box {
        background: #4a3a3a;
        padding: 30px;
        border-radius: 12px;
        width: 400px;
        text-align: center;
    }

    .dash-title {
        font-size: 26px;
        margin-bottom: 20px;
    }

    .dash-stat {
        font-size: 22px;
        margin: 10px 0;
    }

    .close-btn {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: #d4a373;
        color: #3b2f2f;
        cursor: pointer;
    }

    .dashboard-button {
        margin-top: 10px;
        padding: 12px;
        font-size: 20px;
        border-radius: 8px;
        border: none;
        background: #c08552;
        color: #3b2f2f;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="app-container">

    <!-- POS PANEL -->
    <div class="pos-panel">
        <div class="pos-header">McCafé POS</div>

        <div class="order-display" id="orderDisplay">
            <div class="order-item"><span>Latte</span><span>x1</span></div>
            <div class="order-item"><span>Flat White</span><span>x2</span></div>
            <div class="order-item"><span>Mocha</span><span>x1</span></div>
        </div>

        <div class="order-totals">
            <span>Items: <span id="itemCount">4</span></span>
            <span>Total: $<span id="orderTotal">18.00</span></span>
        </div>

        <div class="payment-buttons">
            <button class="pay-btn cash" onclick="proceedStoreOrder('cash')">CASH</button>
            <button class="pay-btn card" onclick="proceedStoreOrder('card')">CARD</button>
        </div>

        <button class="dashboard-button" onclick="openDashboard()">Dashboard</button>

        <div id="drawer"></div>
    </div>

    <!-- KVS PANEL -->
    <div class="kvs-panel">
        <div class="kvs-header">KVS Queue</div>
        <div class="kvs-list" id="kvsList"></div>
    </div>

</div>

<!-- DASHBOARD MODAL -->
<div id="dashboardModal">
    <div class="dashboard-box">
        <div class="dash-title">Dashboard Summary</div>
        <div class="dash-stat">Orders: <span id="dashOrders">0</span></div>
        <div class="dash-stat">Revenue: $<span id="dashRevenue">0.00</span></div>
        <div class="dash-stat">Cash: <span id="dashCash">0</span></div>
        <div class="dash-stat">Card: <span id="dashCard">0</span></div>
        <button class="close-btn" onclick="closeDashboard()">Close</button>
    </div>
</div>

<!-- AUDIO -->
<audio id="beepAudio">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby0g4LVr4EnH7xa0Wk7_7inmmohdTze3ywl3HMyeGrLgC3P5alUPDzjG54bXgXmwo7OLA/exec";

let nextOrderId = 1;
let kvsOrders = [];

/* PAYMENT HANDLER */
function proceedStoreOrder(paymentType) {
    const order = {
        id: nextOrderId++,
        items: [
            { name: "Latte", qty: 1 },
            { name: "Flat White", qty: 2 },
            { name: "Mocha", qty: 1 }
        ],
        total: 18.00,
        paymentType: paymentType
    };

    sendOrderToBackend(order);
    addOrderToKvs(order);
    triggerDrawer(paymentType);
}

/* SEND ORDER */
function sendOrderToBackend(order) {
    fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "addOrder", order })
    });
}

/* KVS */
function addOrderToKvs(order) {
    order.paid = true;
    kvsOrders.push(order);
    renderKvs();
    playBeep();
}

function renderKvs() {
    const list = document.getElementById("kvsList");
    list.innerHTML = "";

    kvsOrders.forEach(order => {
        const div = document.createElement("div");
        div.className = "kvs-order";

        div.innerHTML = `
            <div class="kvs-order-header">
                <span>Order #${order.id}</span>
                <span>$${order.total.toFixed(2)}</span>
            </div>
            <div class="kvs-items">
                ${order.items.map(i => `${i.name} x${i.qty}`).join("<br>")}
            </div>
            <div class="kvs-footer">
                <span class="status-pill status-paid">PAID</span>
                <button class="serve-btn serve-ready" onclick="serveOrder(${order.id})">SERVE</button>
            </div>
        `;

        list.appendChild(div);
    });
}

function serveOrder(id) {
    kvsOrders = kvsOrders.filter(o => o.id !== id);
    renderKvs();

    fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "serveOrder", orderId: id })
    });
}

/* DASHBOARD */
function openDashboard() {
    document.getElementById("dashboardModal").style.display = "flex";
    refreshDashboard();
}

function closeDashboard() {
    document.getElementById("dashboardModal").style.display = "none";
}

function refreshDashboard() {
    fetch(BACKEND_URL + "?summary=1")
        .then(r => r.json())
        .then(data => {
            document.getElementById("dashOrders").textContent = data.totalOrders;
            document.getElementById("dashRevenue").textContent = data.totalRevenue.toFixed(2);
            document.getElementById("dashCash").textContent = data.cashCount;
            document.getElementById("dashCard").textContent = data.cardCount;
        });
}

/* DRAWER */
function triggerDrawer(type) {
    if (type !== "cash") return;
    const drawer = document.getElementById("drawer");
    drawer.classList.remove("open");
    void drawer.offsetWidth;
    drawer.classList.add("open");
}

/* AUDIO */
function playBeep() {
    const audio = document.getElementById("beepAudio");
    audio.currentTime = 0;
    audio.play().catch(() => {});
}
</script>

</body>
</html>
