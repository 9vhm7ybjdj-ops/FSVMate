<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>POS+KVS</title><style>body{margin:0;background:#000;color:#fff;font-family:system-ui}.screen{display:none;padding:1rem}.active{display:block}#modeToggle{position:fixed;top:10px;right:10px;background:#444;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;font-size:.9rem;cursor:pointer;z-index:9999}#pos,#payment{background:#111;min-height:100vh}.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-top:1rem}.pos-btn{background:#333;border:1px solid #555;padding:1rem;border-radius:8px;text-align:center;font-size:1rem;cursor:pointer}#orderList{margin-top:1rem;font-size:1rem;border:1px solid:#333;padding:.5rem;min-height:2rem}#storeBtn,#clearPosBtn,#voidItemBtn{margin-top:1rem;padding:.7rem 1rem;border:none;border-radius:6px;font-size:1rem;cursor:pointer}#storeBtn{background:#1fb64b}#clearPosBtn{background:#444;color:#fff;margin-left:.5rem}#voidItemBtn{background:#b61f1f;margin-left:.5rem}.mod-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}.mod-btn{background:#222;border:1px solid #555;padding:.4rem .7rem;border-radius:6px;font-size:.85rem;cursor:pointer}.cash-grid button,.pay-btn,.cancel-btn{background:#333;color:#fff;border:1px solid #555;padding:.8rem;border-radius:8px;font-size:1rem;cursor:pointer}.cash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.5rem}.preset-row{display:flex;justify-content:space-between;margin-top:.75rem;gap:.5rem}.preset-btn{flex:1;background:#555;border:1px solid #777;padding:.6rem;border-radius:6px;font-size:1rem;cursor:pointer;text-align:center}.pay-btn{background:#1fb64b;width:100%;margin-top:1rem}.cancel-btn{background:#b61f1f;width:100%;margin-top:.5rem}.kvs{background:#000;min-height:100vh}.kvs-list{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}.tile{background:#000;border:2px solid #333;border-radius:8px;width:calc(25% - .75rem);min-width:160px;aspect-ratio:1/1;padding:.5rem;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;transition:transform .25s ease,opacity .25s ease}.tile.bump{transform:translateY(40px) scale(.8);opacity:0}.order-id{font-weight:700}.items{font-size:.85rem;flex:1;overflow:hidden}.timer{font-family:monospace;font-size:1rem;color:#ffd447}.serve-btn{background:#1fb64b;color:#fff;border:none;padding:.4rem;border-radius:6px;cursor:pointer}#cashDrawer{position:fixed;bottom:-260px;left:0;right:0;height:260px;background:#222;border-top:4px solid #555;transition:bottom .3s ease;z-index:9998;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:2rem;color:#fff;padding:1rem}#drawerChange{font-size:2rem;margin-bottom:1rem}#closeDrawerBtn{background:#1fb64b;padding:.7rem 1.2rem;border:none;border-radius:8px;font-size:1.2rem;cursor:pointer}</style></head><body>
<button id="modeToggle">Switch to KVS 1</button>

<div id="pos" class="screen active"><h1>POS Register</h1><div class="pos-grid"><div class="pos-btn" data-item="Latte">Latte</div><div class="pos-btn" data-item="Cappuccino">Cappuccino</div><div class="pos-btn" data-item="Mocha">Mocha</div><div class="pos-btn" data-item="Iced Coffee">Iced Coffee</div><div class="pos-btn" data-item="Caramel Frappe">Caramel Frappe</div><div class="pos-btn" data-item="Blueberry Muffin">Blueberry Muffin</div></div><h2>Current Order</h2><div id="orderList">(empty)</div><div class="mod-grid"><button class="mod-btn" data-mod="Extra Shot">Extra Shot</button><button class="mod-btn" data-mod="Soy">Soy</button><button class="mod-btn" data-mod="Almond">Almond</button><button class="mod-btn" data-mod="No Sugar">No Sugar</button><button class="mod-btn" data-mod="Decaf">Decaf</button></div><button id="storeBtn">Store Order</button><button id="clearPosBtn">Clear</button><button id="voidItemBtn">Void Item</button><h2>Sales Totals</h2><div id="salesTotals"></div></div>

<div id="payment" class="screen"><h1>Payment</h1><div id="payItems"></div><div id="payTotalExact" style="margin-top:1rem;font-size:1.3rem"></div><div id="payTotalRounded" style="margin-top:.3rem;font-size:1.3rem;color:#ffd447"></div><h2>Cash Received</h2><div id="cashEntered" style="font-size:2rem;margin:.5rem 0">0.00</div><div class="cash-grid"><button class="cash-key" data-key="1">1</button><button class="cash-key" data-key="2">2</button><button class="cash-key" data-key="3">3</button><button class="cash-key" data-key="4">4</button><button class="cash-key" data-key="5">5</button><button class="cash-key" data-key="6">6</button><button class="cash-key" data-key="7">7</button><button class="cash-key" data-key="8">8</button><button class="cash-key" data-key="9">9</button><button class="cash-key" data-key="0">0</button><button class="cash-key" data-key=".">.</button><button class="cash-key" data-key="clear">Clear</button></div><div class="preset-row"><button class="preset-btn" data-cash="5">5</button><button class="preset-btn" data-cash="10">10</button><button class="preset-btn" data-cash="20">20</button><button class="preset-btn" data-cash="50">50</button><button class="preset-btn" data-cash="100">100</button></div><button class="pay-btn" id="amountTenderedBtn">Amount Tendered</button><button class="pay-btn" id="payCard">Card Payment</button><button class="cancel-btn" id="cancelPay">Cancel Order</button></div>

<div id="kvs1" class="screen kvs"><h1>KVS – Side 1</h1><div class="kvs-list" id="kvsList1"></div></div>
<div id="kvs2" class="screen kvs"><h1>KVS – Side 2</h1><div class="kvs-list" id="kvsList2"></div></div>

<div id="cashDrawer"><div id="drawerChange">Change: $0.00</div><button id="closeDrawerBtn">Close Drawer</button></div>

<script>

t.onclick=()=>{selectedIndex=parseInt(t.dataset.index),updateOrderList()}})):(e.innerHTML="(empty)",selectedIndex=null)}document.getElementById("clearPosBtn").onclick=()=>{currentOrder=[],selectedIndex=null,updateOrderList()},document.getElementById("voidItemBtn").onclick=()=>{selectedIndex!==null&&(currentOrder.splice(selectedIndex,1),selectedIndex=null,updateOrderList())},document.querySelectorAll(".mod-btn").forEach(e=>{e.onclick=()=>{if(selectedIndex===null)return;let t=e.dataset.mod,o=currentOrder[selectedIndex];o.modifiers.includes(t)||(o.modifiers.push(t),updateOrderList())}});function buildOrder(){let e=currentOrder.reduce((t,o)=>t+o.price,0);return{id:"ORD-"+(1e3+Math.floor(9e3*Math.random())),items:currentOrder.map(formatItem),createdAt:Date.now(),total:e}}let kvs1Orders=[],kvs2Orders=[];function addKvsOrderAuto(e){let t;kvs1Orders.length<kvs2Orders.length?t=1:kvs2Orders.length<kvs1Orders.length?t=2:t=lastSideUsed===1?2:1,lastSideUsed=t,t===1?kvs1Orders.push(e):kvs2Orders.push(e),t===1?playDingDongSide1():playDingDongSide2(),renderKvs();let o=e.total,r=roundToFiveCents(e.total);fetch(BACKEND_URL,{method:"POST",contentType:"application/json",body:JSON.stringify({id:e.id,side:t,items:e.items,totalExact:o,totalRounded:r})}).catch(n=>console.error("Failed to send order",n))}document.getElementById("storeBtn").onclick=()=>{if(!currentOrder.length)return;let e=buildOrder();currentPaymentOrder=e,addKvsOrderAuto(e),document.getElementById("pos").classList.remove("active"),document.getElementById("payment").classList.add("active"),document.getElementById("payItems").textContent=e.items.join(", ");let t=e.total,o=roundToFiveCents(e.total);document.getElementById("payTotalExact").textContent=`Exact Total: $${t.toFixed(2)}`,document.getElementById("payTotalRounded").textContent=`Cash Total (Rounded): $${o.toFixed(2)}`,currentOrder=[],selectedIndex=null,updateOrderList()};let cashInput="";function updateCashDisplay(){document.getElementById("cashEntered").style.color=" function syncKvsFromBackend(){
fetch(BACKEND_URL)
.then(r=>r.json())
.then(data=>{
let open=data.orders.filter(o=>o.status==="OPEN");
kvs1Orders=[];kvs2Orders=[];
open.forEach(o=>{
let order={id:o.id,items:o.items.split(", "),createdAt:new Date(o.createdAt).getTime(),total:o.totalExact};

setInterval(syncKvsFromBackend,3000);

updateSalesDisplay();updateOrderList();updateCashDisplay();
</script></body></html>
