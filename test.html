<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>POS + Dual KVS Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body { margin:0; background:#000; color:#fff; font-family:system-ui; }
  .screen { display:none; padding:1rem; }
  .active { display:block; }

  #modeToggle {
    position:fixed; top:10px; right:10px;
    background:#444; color:#fff; border:none;
    padding:0.5rem 1rem; border-radius:6px;
    font-size:0.9rem; cursor:pointer;
    z-index:9999;
  }

  /* POS */
  #pos, #payment { background:#111; min-height:100vh; }
  #pos h1, #payment h1 { margin-top:2.5rem; }

  .pos-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:0.75rem;
    margin-top:1rem;
  }

  .pos-btn {
    background:#333;
    border:1px solid #555;
    padding:1rem;
    border-radius:8px;
    text-align:center;
    font-size:1rem;
    cursor:pointer;
  }

  #orderList {
    margin-top:1rem;
    font-size:1rem;
    border:1px solid #333;
    padding:0.5rem;
    min-height:2rem;
  }

  #storeBtn, #clearPosBtn, #voidItemBtn {
    margin-top:1rem;
    padding:0.7rem 1rem;
    border:none;
    border-radius:6px;
    font-size:1rem;
    cursor:pointer;
  }

  #storeBtn { background:#1fb64b; }
  #clearPosBtn { background:#444; color:#fff; margin-left:0.5rem; }
  #voidItemBtn { background:#b61f1f; margin-left:0.5rem; }

  .mod-grid {
    display:flex;
    flex-wrap:wrap;
    gap:0.5rem;
    margin-top:0.75rem;
  }

  .mod-btn {
    background:#222;
    border:1px solid #555;
    padding:0.4rem 0.7rem;
    border-radius:6px;
    font-size:0.85rem;
    cursor:pointer;
  }

  /* Payment */
  .cash-grid button,
  .pay-btn,
  .cancel-btn {
    background:#333;
    color:#fff;
    border:1px solid #555;
    padding:0.8rem;
    border-radius:8px;
    font-size:1rem;
    cursor:pointer;
  }

  .cash-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:0.5rem;
    margin-top:0.5rem;
  }

  /* PRESET CASH BUTTONS */
  .preset-row {
    display:flex;
    justify-content:space-between;
    margin-top:0.75rem;
    gap:0.5rem;
  }

  .preset-btn {
    flex:1;
    background:#555;
    border:1px solid #777;
    padding:0.6rem;
    border-radius:6px;
    font-size:1rem;
    cursor:pointer;
    text-align:center;
  }

  .pay-btn {
    background:#1fb64b;
    width:100%;
    margin-top:1rem;
  }

  .cancel-btn {
    background:#b61f1f;
    width:100%;
    margin-top:0.5rem;
  }

  /* KVS */
  .kvs { background:#000; min-height:100vh; }
  .kvs h1 { margin-top:2.5rem; }

  .kvs-list {
    display:flex;
    flex-wrap:wrap;
    gap:0.75rem;
    margin-top:1rem;
  }

  .tile {
    background:#000;
    border:2px solid #333;
    border-radius:8px;
    width:calc(25% - 0.75rem);
    min-width:160px;
    aspect-ratio:1/1;
    padding:0.5rem;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-sizing:border-box;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .tile.bump {
    transform:translateY(40px) scale(0.8);
    opacity:0;
  }

  .order-id { font-weight:700; }
  .items { font-size:0.85rem; flex:1; overflow:hidden; }
  .timer { font-family:monospace; font-size:1rem; color:#ffd447; }

  .serve-btn {
    background:#1fb64b;
    color:#fff;
    border:none;
    padding:0.4rem;
    border-radius:6px;
    cursor:pointer;
  }

  @media (max-width:900px) {
    .tile { width:calc(33.333% - 0.75rem); }
  }

  @media (max-width:600px) {
    .tile { width:calc(50% - 0.75rem); }
  }

  /* Cash drawer */
  #cashDrawer {
    position:fixed;
    bottom:-260px;
    left:0;
    right:0;
    height:260px;
    background:#222;
    border-top:4px solid #555;
    transition:bottom 0.3s ease;
    z-index:9998;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    color:#fff;
    padding:1rem;
  }

  #drawerChange {
    font-size:2rem;
    margin-bottom:1rem;
  }

  #closeDrawerBtn {
    background:#1fb64b;
    padding:0.7rem 1.2rem;
    border:none;
    border-radius:8px;
    font-size:1.2rem;
    cursor:pointer;
  }
</style>
</head>
<body>

<button id="modeToggle">Switch to KVS 1</button>

<!-- POS ORDER ENTRY -->
<div id="pos" class="screen active">
  <h1>POS Register</h1>

  <div class="pos-grid">
    <div class="pos-btn" data-item="Latte">Latte</div>
    <div class="pos-btn" data-item="Cappuccino">Cappuccino</div>
    <div class="pos-btn" data-item="Mocha">Mocha</div>
    <div class="pos-btn" data-item="Iced Coffee">Iced Coffee</div>
    <div class="pos-btn" data-item="Caramel Frappe">Caramel Frappe</div>
    <div class="pos-btn" data-item="Blueberry Muffin">Blueberry Muffin</div>
  </div>

  <h2>Current Order</h2>
  <div id="orderList">(empty)</div>

  <div class="mod-grid">
    <button class="mod-btn" data-mod="Extra Shot">Extra Shot</button>
    <button class="mod-btn" data-mod="Soy">Soy</button>
    <button class="mod-btn" data-mod="Almond">Almond</button>
    <button class="mod-btn" data-mod="No Sugar">No Sugar</button>
    <button class="mod-btn" data-mod="Decaf">Decaf</button>
  </div>

  <button id="storeBtn">Store Order</button>
  <button id="clearPosBtn">Clear</button>
  <button id="voidItemBtn">Void Item</button>

  <h2>Sales Totals</h2>
  <div id="salesTotals"></div>
</div>

<!-- PAYMENT SCREEN -->
<div id="payment" class="screen">
  <h1>Payment</h1>

  <!-- Exact + Rounded totals -->
  <div id="payItems"></div>
  <div id="payTotalExact" style="margin-top:1rem; font-size:1.3rem;"></div>
  <div id="payTotalRounded" style="margin-top:0.3rem; font-size:1.3rem; color:#ffd447;"></div>

  <h2>Cash Received</h2>
  <div id="cashEntered" style="font-size:2rem; margin:0.5rem 0;">0.00</div>

  <!-- KEYPAD -->
  <div class="cash-grid">
    <button class="cash-key" data-key="1">1</button>
    <button class="cash-key" data-key="2">2</button>
    <button class="cash-key" data-key="3">3</button>
    <button class="cash-key" data-key="4">4</button>
    <button class="cash-key" data-key="5">5</button>
    <button class="cash-key" data-key="6">6</button>
    <button class="cash-key" data-key="7">7</button>
    <button class="cash-key" data-key="8">8</button>
    <button class="cash-key" data-key="9">9</button>
    <button class="cash-key" data-key="0">0</button>
    <button class="cash-key" data-key=".">.</button>
    <button class="cash-key" data-key="clear">Clear</button>
  </div>

  <!-- PRESET CASH BUTTONS (Option C) -->
  <div class="preset-row">
    <button class="preset-btn" data-cash="5">5</button>
    <button class="preset-btn" data-cash="10">10</button>
    <button class="preset-btn" data-cash="20">20</button>
    <button class="preset-btn" data-cash="50">50</button>
    <button class="preset-btn" data-cash="100">100</button>
  </div>

  <button class="pay-btn" id="amountTenderedBtn">Amount Tendered</button>
  <button class="pay-btn" id="payCard">Card Payment</button>
  <button class="cancel-btn" id="cancelPay">Cancel Order</button>
</div>

<!-- KVS SIDE 1 -->
<div id="kvs1" class="screen kvs">
  <h1>KVS – Side 1</h1>
  <div class="kvs-list" id="kvsList1"></div>
</div>

<!-- KVS SIDE 2 -->
<div id="kvs2" class="screen kvs">
  <h1>KVS – Side 2</h1>
  <div class="kvs-list" id="kvsList2"></div>
</div>

<!-- CASH DRAWER -->
<div id="cashDrawer">
  <div id="drawerChange">Change: $0.00</div>
  <button id="closeDrawerBtn">Close Drawer</button>
</div>
<!-- KVS SIDE 1 -->
<div id="kvs1" class="screen kvs">
  <h1>KVS – Side 1</h1>
  <div class="kvs-list" id="kvsList1"></div>
</div>

<!-- KVS SIDE 2 -->
<div id="kvs2" class="screen kvs">
  <h1>KVS – Side 2</h1>
  <div class="kvs-list" id="kvsList2"></div>
</div>

<!-- CASH DRAWER -->
<div id="cashDrawer">
  <div id="drawerChange">Change: $0.00</div>
  <button id="closeDrawerBtn">Close Drawer</button>
</div>

<!-- BEGIN SCRIPT SECTION -->
<script>
/* ---------------------------
   AUDIO ENGINE
----------------------------*/
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* SIDE 1 SOUND — classic ding‑dong */
function playDingDongSide1() {
  if (audioCtx.state === "suspended") audioCtx.resume();

  function tone(freq, start, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(1.0, audioCtx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
    osc.start(audioCtx.currentTime + start);
    osc.stop(audioCtx.currentTime + start + duration);
  }

  tone(880, 0, 0.15);
  tone(660, 0.18, 0.25);
}

/* SIDE 2 SOUND — sharper bip‑BOP */
function playDingDongSide2() {
  if (audioCtx.state === "suspended") audioCtx.resume();

  function tone(freq, start, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "square";
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(1.0, audioCtx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + duration);
    osc.start(audioCtx.currentTime + start);
    osc.stop(audioCtx.currentTime + start + duration);
  }

  tone(500, 0, 0.15);
  tone(900, 0.18, 0.25);
}

/* CASH DRAWER SOUND */
function playDrawerSound() {
  if (audioCtx.state === "suspended") audioCtx.resume();

  function thump() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.value = 120;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  }

  function click() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.value = 800;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    osc.start(audioCtx.currentTime + 0.1);
    osc.stop(audioCtx.currentTime + 0.18);
  }

  thump();
  click();
}

/* ---------------------------
   AUSTRALIAN ROUNDING (CASH ONLY)
----------------------------*/
function roundToFiveCents(amount) {
  return Math.round(amount * 20) / 20; // 20 increments per dollar = 5c
}

/* ---------------------------
   SALES TRACKING
----------------------------*/
let totalCashSales = 0;
let totalCardSales = 0;

function updateSalesDisplay() {
  document.getElementById("salesTotals").innerHTML = `
    Cash: $${totalCashSales.toFixed(2)}<br>
    Card: $${totalCardSales.toFixed(2)}<br>
    Total: $${(totalCashSales + totalCardSales).toFixed(2)}
  `;
}

/* ---------------------------
   MENU + ORDER MODEL
----------------------------*/
const menuPrices = {
  "Latte": 5,
  "Cappuccino": 5,
  "Mocha": 5.5,
  "Iced Coffee": 5.5,
  "Caramel Frappe": 6,
  "Blueberry Muffin": 4
};

let currentOrder = [];
let selectedIndex = null;
let lastSideUsed = 2;
let currentPaymentOrder = null;

function formatItem(item) {
  if (!item.modifiers.length) return item.name;
  return `${item.name} (${item.modifiers.join(", ")})`;
}

/* ---------------------------
   POS ORDER ENTRY
----------------------------*/
document.querySelectorAll(".pos-btn").forEach(btn => {
  btn.onclick = () => {
    const name = btn.dataset.item;
    currentOrder.push({
      name,
      modifiers: [],
      price: menuPrices[name] || 5
    });
    selectedIndex = currentOrder.length - 1;
    updateOrderList();
  };
});

function updateOrderList() {
  const list = document.getElementById("orderList");

  if (!currentOrder.length) {
    list.innerHTML = "(empty)";
    selectedIndex = null;
    return;
  }

  list.innerHTML = currentOrder
    .map((item, i) =>
      `<div class="order-line" data-index="${i}"
        style="padding:4px; cursor:pointer; ${selectedIndex === i ? 'background:#333;' : ''}">
        ${formatItem(item)}
      </div>`
    )
    .join("");

  document.querySelectorAll(".order-line").forEach(el => {
    el.onclick = () => {
      selectedIndex = parseInt(el.dataset.index);
      updateOrderList();
    };
  });
}

document.getElementById("clearPosBtn").onclick = () => {
  currentOrder = [];
  selectedIndex = null;
  updateOrderList();
};

document.getElementById("voidItemBtn").onclick = () => {
  if (selectedIndex === null) return;
  currentOrder.splice(selectedIndex, 1);
  selectedIndex = null;
  updateOrderList();
};

/* ---------------------------
   MODIFIERS
----------------------------*/
document.querySelectorAll(".mod-btn").forEach(btn => {
  btn.onclick = () => {
    if (selectedIndex === null) return;
    const mod = btn.dataset.mod;
    const item = currentOrder[selectedIndex];
    if (!item.modifiers.includes(mod)) {
      item.modifiers.push(mod);
      updateOrderList();
    }
  };
});

/* ---------------------------
   BUILD ORDER
----------------------------*/
function buildOrder() {
  const total = currentOrder.reduce((sum, item) => sum + item.price, 0);
  return {
    id: "ORD-" + (1000 + Math.floor(Math.random() * 9000)),
    items: currentOrder.map(formatItem),
    createdAt: Date.now(),
    total
  };
}

/* ---------------------------
   SMART ROUTING TO KVS
----------------------------*/
let kvs1Orders = [];
let kvs2Orders = [];

function addKvsOrderAuto(order) {
  let side;

  if (kvs1Orders.length < kvs2Orders.length) side = 1;
  else if (kvs2Orders.length < kvs1Orders.length) side = 2;
  else side = lastSideUsed === 1 ? 2 : 1;

  lastSideUsed = side;

  if (side === 1) kvs1Orders.push(order);
  else kvs2Orders.push(order);

  if (side === 1) playDingDongSide1();
  else playDingDongSide2();

  renderKvs();
}

/* ---------------------------
   STORE ORDER → PAYMENT
----------------------------*/
document.getElementById("storeBtn").onclick = () => {
  if (!currentOrder.length) return;

  const order = buildOrder();
  currentPaymentOrder = order;

  addKvsOrderAuto(order);

  document.getElementById("pos").classList.remove("active");
  document.getElementById("payment").classList.add("active");

  document.getElementById("payItems").textContent = order.items.join(", ");

  const exact = order.total;
  const rounded = roundToFiveCents(order.total);

  document.getElementById("payTotalExact").textContent =
    `Exact Total: $${exact.toFixed(2)}`;

  document.getElementById("payTotalRounded").textContent =
    `Cash Total (Rounded): $${rounded.toFixed(2)}`;

  currentOrder = [];
  selectedIndex = null;
  updateOrderList();
};
/* ---------------------------
   CASH INPUT (EFTPOS STYLE)
----------------------------*/
let cashInput = "";

function updateCashDisplay() {
  document.getElementById("cashEntered").style.color = "#fff";
  document.getElementById("cashEntered").textContent =
    cashInput || "0.00";
}

document.querySelectorAll(".cash-key").forEach(key => {
  key.onclick = () => {
    const val = key.dataset.key;

    if (val === "clear") {
      cashInput = "";
    } else if (val === ".") {
      if (!cashInput.includes(".")) cashInput += ".";
    } else {
      cashInput += val;
    }

    updateCashDisplay();
  };
});

/* ---------------------------
   PRESET CASH BUTTONS
----------------------------*/
document.querySelectorAll(".preset-btn").forEach(btn => {
  btn.onclick = () => {
    const amount = parseFloat(btn.dataset.cash);
    cashInput = amount.toFixed(2);
    updateCashDisplay();
  };
});

/* ---------------------------
   OPEN CASH DRAWER
----------------------------*/
function openCashDrawer(change) {
  const drawer = document.getElementById("cashDrawer");
  document.getElementById("drawerChange").textContent =
    `Change: $${change.toFixed(2)}`;
  drawer.style.bottom = "0px";
  playDrawerSound();
}

document.getElementById("closeDrawerBtn").onclick = () => {
  document.getElementById("cashDrawer").style.bottom = "-260px";
  resetToPOS();
};

/* ---------------------------
   AMOUNT TENDERED BUTTON
   (AU rounding applied to CASH ONLY)
----------------------------*/
document.getElementById("amountTenderedBtn").onclick = () => {
  if (!currentPaymentOrder) return;

  const received = parseFloat(cashInput);
  if (isNaN(received)) return;

  const exactTotal = currentPaymentOrder.total;
  const roundedTotal = roundToFiveCents(exactTotal);

  const change = received - roundedTotal;

  /* SHORT CASH — DO NOT OPEN DRAWER */
  if (change < 0) {
    document.getElementById("cashEntered").style.color = "red";
    document.getElementById("cashEntered").textContent =
      `Short by $${Math.abs(change).toFixed(2)}`;
    return;
  }

  /* ENOUGH CASH — PROCESS PAYMENT */
  totalCashSales += roundedTotal;
  updateSalesDisplay();

  /* Open drawer with correct change */
  openCashDrawer(change);
};

/* ---------------------------
   CARD PAYMENT (NO ROUNDING)
----------------------------*/
document.getElementById("payCard").onclick = () => {
  if (!currentPaymentOrder) return;

  totalCardSales += currentPaymentOrder.total;
  updateSalesDisplay();
  resetToPOS();
};

/* ---------------------------
   CANCEL PAYMENT
----------------------------*/
document.getElementById("cancelPay").onclick = resetToPOS;

/* ---------------------------
   RESET POS
----------------------------*/
function resetToPOS() {
  cashInput = "";
  updateCashDisplay();
  currentPaymentOrder = null;

  document.getElementById("payment").classList.remove("active");
  document.getElementById("pos").classList.add("active");
}
/* ---------------------------
   KVS RENDERING
----------------------------*/
function removeKvsOrder(side, id) {
  const tile = document.querySelector(`.tile[data-id="${id}"]`);
  if (!tile) return;

  tile.classList.add("bump");

  setTimeout(() => {
    if (side === 1)
      kvs1Orders = kvs1Orders.filter(o => o.id !== id);
    else
      kvs2Orders = kvs2Orders.filter(o => o.id !== id);

    renderKvs();
  }, 250);
}

function renderKvs() {
  renderSide(1, kvs1Orders, document.getElementById("kvsList1"));
  renderSide(2, kvs2Orders, document.getElementById("kvsList2"));
}

function renderSide(side, orders, container) {
  container.innerHTML = "";

  orders.forEach(order => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.dataset.id = order.id;

    tile.innerHTML = `
      <div class="order-id">${order.id}</div>
      <div class="items">${order.items.join(", ")}</div>
      <div class="timer" data-id="${order.id}"></div>
      <button class="serve-btn">SERVE</button>
    `;

    tile.querySelector(".serve-btn").onclick =
      () => removeKvsOrder(side, order.id);

    container.appendChild(tile);
  });
}

/* ---------------------------
   KVS TIMERS
----------------------------*/
setInterval(() => {
  const now = Date.now();

  [...kvs1Orders, ...kvs2Orders].forEach(order => {
    const el = document.querySelector(`.timer[data-id="${order.id}"]`);
    if (el) {
      const sec = Math.floor((now - order.createdAt) / 1000);
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      el.textContent = `${m}:${s}`;
    }
  });
}, 500);

/* ---------------------------
   SCREEN SWITCHER
----------------------------*/
const posScreen = document.getElementById("pos");
const payScreen = document.getElementById("payment");
const kvs1Screen = document.getElementById("kvs1");
const kvs2Screen = document.getElementById("kvs2");
const toggleBtn = document.getElementById("modeToggle");

let mode = 0;

toggleBtn.onclick = () => {
  mode = (mode + 1) % 3;

  posScreen.classList.toggle("active", mode === 0);
  payScreen.classList.remove("active");
  kvs1Screen.classList.toggle("active", mode === 1);
  kvs2Screen.classList.toggle("active", mode === 2);

  toggleBtn.textContent =
    mode === 0 ? "Switch to KVS 1" :
    mode === 1 ? "Switch to KVS 2" :
                 "Switch to POS";
};

/* ---------------------------
   INIT
----------------------------*/
updateSalesDisplay();
updateOrderList();
updateCashDisplay();

</script>
</body>
</html>
