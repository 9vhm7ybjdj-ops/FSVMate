eight:700}.kvs-tab.active{background:#d4a373;color:#3b2f2f}.kvs-list{flex:1;background:#4a3a3a;border-radius:10px;padding:10px;overflow-y:auto}.kvs-order{background:#5a4646;padding:8px;border-radius:8px;margin-bottom:8px;font-size:16px}.kvs-order-header{display:flex;justify-content:space-between;margin-bottom:4px;font-weight:700}.kvs-items{margin-bottom:6px}.kvs-footer{display:flex;justify-content:space-between;align-items:center}.serve-btn{padding:6px 10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:14px}.serve-ready{background:#4caf50;color:#fff}.status-pill{padding:3px 8px;border-radius:999px;font-size:13px;background:#2e7d32}.payment-panel{position:absolute;top:0;right:-100%;width:100%;height:100%;background:#2f2525;box-sizing:border-box;padding:16px;display:flex;flex-direction:column;transition:transform .35s ease-out;transform:translateX(0)}.payment-panel.show{transform:translateX(-100%)}.payment-header{font-size:24px;font-weight:700;margin-bottom:8px}.payment-summary{margin-bottom:10px;font-size:18px}.payment-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:18px}.tender-display{font-size:22px;font-weight:700;margin-bottom:8px}.quick-cash{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}.quick-btn{flex:1 1 30%;padding:10px;font-size:18px;border-radius:8px;border:none;cursor:pointer;background:#d4a373;color:#3b2f2f;font-weight:700}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}.key-btn{padding:14px;font-size:20px;border-radius:8px;border:none;cursor:pointer;background:#5a4646;color:#fff;font-weight:700}.pay-actions{display:flex;gap:8px;margin-top:auto}.pay-complete{flex:1;padding:12px;font-size:18px;border-radius:8px;border:none;cursor:pointer;font-weight:700}.pay-cash{background:#4caf50;color:#fff}.pay-card{background:#c08552;color:#3b2f2f}.pay-complete:disabled{opacity:.4;cursor:not-allowed}.cancel-payment{margin-top:8px;padding:8px;font-size:16px;border-radius:8px;border:none;cursor:pointer;background:#8d4b4b;color:#fff}#drawerOverlay{position:absolute;bottom:-200px;left:0;width:100%;background:#111;color:#fff;padding:16px;box-sizing:border-box;border-radius:12px 12px 0 0;transition:transform .35s ease-out;transform:translateY(0)}#drawerOverlay.open{transform:translateY(-200px)}.drawer-title{font-size:20px;margin-bottom:8px}.drawer-change{font-size:24px;font-weight:700;margin-bottom:10px}.drawer-close-btn{padding:10px 16px;font-size:16px;border-radius:8px;border:none;cursor:pointer;background:#d4a373;color:#3b2f2f;font-weight:700}#dashboardModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center}.dashboard-box{background:#4a3a3a;padding:24px;border-radius:10px;width:360px;text-align:center}.dash-title{font-size:24px;margin-bottom:16px}.dash-stat{font-size:20px;margin:6px 0}.close-btn{margin-top:16px;padding:8px 16px;font-size:16px;border-radius:8px;border:none;background:#d4a373;color:#3b2f2f;cursor:pointer}
</style></head><body>
<div class="app-container">

</div>
</div>
<div class="kvs-panel">

</div>
</div>
<div id="dashboardModal"><div class="dashboard-box"><div class="dash-title">Dashboard Summary</div><div class="dash-stat">Orders: <span id="dashOrders">0</span></div><div class="dash-stat">Revenue: $<span id="dashRevenue">0.00</span></div><div class="dash-stat">Cash: <span id="dashCash">0</span></div><div class="dash-stat">Card: <span id="dashCard">0</span></div><button class="close-btn" onclick="closeDashboard()">Close</button></div></div>
<div id="modifierPopup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;"><div style="background:#4a3a3a;padding:20px;border-radius:10px;width:300px;"><h3>Choose Modifiers</h3><label>Milk:</label><select id="modMilk" style="width:100%;padding:6px;"><option value="">Full Cream</option><option value="Skim">Skim</option><option value="Soy">Soy</option><option value="Almond">Almond</option><option value="Oat">Oat</option></select><br><br><label>Extras:</label><select id="modExtra" style="width:100%;padding:6px;"><option value="">None</option><option value="Extra Shot">Extra Shot</option><option value="Vanilla Syrup">Vanilla Syrup</option><option value="Caramel Syrup">Caramel Syrup</option></select><br><br><button onclick="applyModifiers()">OK</button></div></div>

<audio id="beepAudio"><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>
<audio id="soundSide1"><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>
<audio id="soundSide2"><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>
<script>
const BACKEND_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTz-HYAAIfuG41CrQ9cRHks3E6D-vW1AD5kud7EEoeoNWzA_7cujMkcUrG50GHYZcjyLaMiDP1OLJpA-XpRyOs5qZuuDHOv32uPVdJg-MzD_vrVzbMSHPpInLXTmakQVn1vKROdgx36VeeuHxgUrJsM9MYfsjhbWA9RPVNVWBIThbGV2FYZIzsiTFyEvtsGzjdvOM-mxdGjU5qWYzj2jHazy6J4Y5L3k-Jry8plOpfM44SOcpEtUvx6PCki7Bdp47wL815Bn7ECG_ieMDwmVqKygouiYw&lib=MrRyxjSdbBqWTZGBRZGqQbvuT34rT0BK1";let currentOrder=[],selectedIndex=-1,kvsOrders=[],kvsSideView=1,nextOrderId=1,inPayment=!1,pendingOrder=null,tendered=0,pendingItem=null,lastOrderIds=[];function addItem(e){if(inPayment)return;pendingItem={name:e.getAttribute("data-name"),price:parseFloat(e.getAttribute("data-price")),qty:1,modifiers:{}};document.getElementById("modifierPopup").style.display="flex"}function applyModifiers(){pendingItem.modifiers={milk:document.getElementById("modMilk").value,extra:document.getElementById("modExtra").value};currentOrder.push(pendingItem);pendingItem=null;document.getElementById("modifierPopup").style.display="none";renderOrder()}function renderOrder(){const e=document.getElementById("orderDisplay");e.innerHTML="";let t=0,n=0;currentOrder.forEach((r,o)=>{t+=r.price*r.qty,n+=r.qty;const d=document.createElement("div");d.className="order-line"+(o===selectedIndex?" selected":""),d.innerHTML=`<span>${r.name} x${r.qty}<br><small>${r.modifiers.milk||""} ${r.modifiers.extra||""}</small></span><span>$${(r.price*r.qty).toFixed(2)}</span>`,d.onclick=()=>{if(inPayment)return;selectedIndex=o===selectedIndex?-1:o,renderOrder()},e.appendChild(d)}),document.getElementById("orderTotal").textContent=t.toFixed(2),document.getElementById("itemCount").textContent=n,document.getElementById("clearBtn").disabled=0===currentOrder.length||inPayment,document.getElementById("voidBtn").disabled=-1===selectedIndex||inPayment,document.getElementById("storeBtn").disabled=0===currentOrder.length||inPayment}function clearOrder(){if(inPayment)return;currentOrder=[],selectedIndex=-1,renderOrder()}function voidSelected(){if(inPayment)return;selectedIndex<0||selectedIndex>=currentOrder.length||(currentOrder.splice(selectedIndex,1),selectedIndex=-1,renderOrder())}function storeOrder(){if(inPayment||0===currentOrder.length)return;document.getElementById("namePopup").style.display="flex"}function saveCustomerName(){const e=document.getElementById("custNameInput").value.trim();document.getElementById("namePopup").style.display="none",createOrderAfterName(e)}function createOrderAfterName(e){const t=parseFloat(document.getElementById("orderTotal").textContent)||0,n=kvsOrders.filter(e=>1===e.side).length,r=kvsOrders.filter(e=>2===e.side).length,o=n<=r?1:2,d=nextOrderId++,a={id:d,side:o,items:currentOrder.map(e=>({name:e.name,qty:e.qty,price:e.price,modifiers:e.modifiers})),total:t,paymentType:null,customerName:e};pendingOrder=a,addToKvs(a),playBeep(),inPayment=!0,document.getElementById("payOrderId").textContent=a.id,document.getElementById("payTotal").textContent=a.total.toFixed(2),tendered=0,updateTenderDisplay(),document.getElementById("paymentPanel").classList.add("show"),document.getElementById("completeCashBtn").disabled=!0,renderOrder()}function addQuickCash(e){tendered+=e,updateTenderDisplay()}function pressKey(e){let t=tendered.toString();if("back"===e)t=t.slice(0,-1),(""===t||"-"===t)&&(t="0");else if("."===e){t.includes(".")||(t+=".")}else t="0"===t?e:t+e;const n=parseFloat(t);tendered=isNaN(n)?0:n,updateTenderDisplay()}function updateTenderDisplay(){const e=pendingOrder?pendingOrder.total:0,t=tendered-e;document.getElementById("tenderedDisplay").textContent=tendered.toFixed(2),document.getElementById("changeDisplay").textContent=(t>0?t:0).toFixed(2);const n=document.getElementById("completeCashBtn");pendingOrder&&tendered>=e&&e>0?n.disabled=!1:n.disabled=!0}function completeCash(){if(!pendingOrder)return;const e=pendingOrder.total;if(!(tendered<e)){pendingOrder.paymentType="cash",sendOrderToBackend(pendingOrder);const t=tendered-e;document.getElementById("drawerChangeAmount").textContent=t.toFixed(2),openDrawer()}}function completeCard(){pendingOrder&&(pendingOrder.paymentType="card",sendOrderToBackend(pendingOrder),resetAfterPayment())}function cancelPayment(){pendingOrder=null,inPayment=!1,tendered=0,document.getElementById("paymentPanel").classList.remove("show"),updateTenderDisplay(),renderOrder()}function openDrawer(){document.getElementById("drawerOverlay").classList.add("open")}function closeDrawer(){document.getElementById("drawerOverlay").classList.remove("open"),resetAfterPayment()}function resetAfterPayment(){pendingOrder=null,inPayment=!1,tendered=0,document.getElementById("paymentPanel").classList.remove("show"),currentOrder=[],selectedIndex=-1,renderOrder()}function sendOrderToBackend(e){fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addOrder",order:e})}).catch(()=>{})}function addToKvs(e){kvsOrders.push(e),renderKvs()}function setKvsView(e){kvsSideView=e,document.getElementById("kvsSide1Tab").classList.toggle("active",1===e),document.getElementById("kvsSide2Tab").classList.toggle("active",2===e),renderKvs()}function renderKvs(){const e=document.getElementById("kvsList");e.innerHTML="",kvsOrders.filter(e=>e.side===kvsSideView).forEach(t=>{const n=document.createElement("div");n.className="kvs-order";const r=t.items.map(e=>`${e.name} x${e.qty}${e.modifiers&& (e.modifiers.milk||e.modifiers.extra) ?"<br><small>"+(e.modifiers.milk||"")+" "+(e.modifiers.extra||"")+"</small>":""}`).join("<br>");n.innerHTML=`<div class="kvs-order-header"><span>${t.customerName?t.customerName:"Order #"+t.id}</span><span>$${t.total.toFixed(2)}</span></div><div class="kvs-items">${r}</div><div class="kvs-footer"><span class="status-pill" id="timer-${t.id}">0:00</span><button class="serve-btn serve-ready" onclick="serveOrder(${t.id})">SERVE</button></div>`,e.appendChild(n)})}function serveOrder(e){fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"serveOrder",orderId:e})}).then(()=>refreshKvsFromBackend()).catch(()=>{})}function refreshKvsFromBackend(){fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"getOrders"})}).then(e=>e.json()).then(e=>{const t=e.map(e=>e.id);t.forEach(t=>{lastOrderIds.includes(t)||(order=e.find(e=>e.id===t),order.side===1?document.getElementById("soundSide1").play().catch(()=>{}):document.getElementById("soundSide2").play().catch(()=>{}))});var order;lastOrderIds=t,kvsOrders=e,renderKvs()}).catch(()=>{})}function openDashboard(){document.getElementById("dashboardModal").style.display="flex",refreshDashboard()}function closeDashboard(){document.getElementById("dashboardModal").style.display="none"}function refreshDashboard(){fetch(BACKEND_URL+"?summary=1").then(e=>e.json()).then(e=>{document.getElementById("dashOrders").textContent=e.totalOrders??0,document.getElementById("dashRevenue").textContent=(e.totalRevenue??0).toFixed(2),document.getElementById("dashCash").textContent=e.cashCount??0,document.getElementById("dashCard").textContent=e.cardCount??0}).catch(()=>{})}function playBeep(){const e=document.getElementById("beepAudio");e.currentTime=0,e.play().catch(()=>{})}function formatTimer(e){const t=Math.floor(e/60),n=e%60;return`${t}:${n.toString().padStart(2,"0")}`}setInterval(()=>{const e=Date.now();kvsOrders.forEach(t=>{const n=new Date(t.timestamp).getTime(),r=Math.floor((e-n)/1e3),o=document.getElementById(`timer-${t.id}`);o&&(o.textContent=formatTimer(r))})},1e3);renderOrder();refreshKvsFromBackend();setInterval(refreshKvsFromBackend,2e3);
</script>
</body></html>
